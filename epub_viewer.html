<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>純前端 EPUB 閱讀與列印工具</title>
    <!-- 純 SVG 的書本 Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%230056b3' d='M21 5c-1.11-.35-2.33-.5-3.5-.5-1.95 0-4.05.4-5.5 1.5-1.45-1.1-3.55-1.5-5.5-1.5S2.45 4.9 1 6v14.65c0 .25.25.5.5.5.1 0 .15-.05.25-.05C3.1 20.45 5.05 20 6.5 20c1.95 0 4.05.4 5.5 1.5 1.35-.85 3.8-1.5 5.5-1.5 1.2 0 2.4.15 3.5.5v11.5z'/></svg>" type="image/svg+xml">
    
    <!-- 引入 JSZip (ePub.js 依賴) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <!-- 引入 ePub.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.3.93/epub.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 頂部控制列 */
        #controls {
            background-color: #fff;
            padding: 15px 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            z-index: 10;
        }

        #controls input[type="file"], #controls input[type="text"] {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        #controls button, #controls select {
            padding: 8px 15px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        #controls button:hover { background-color: #004494; }
        #controls button:disabled { background-color: #ccc; cursor: not-allowed; }
        #controls select { background-color: #fff; color: #333; border: 1px solid #ccc; }

        /* 排版微調工具列樣式 */
        .tool-group {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #f4f4f9;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }
        .tool-group span {
            font-size: 13px;
            color: #666;
            margin-right: 4px;
            font-weight: bold;
        }
        .tool-btn {
            background: #fff !important;
            color: #333 !important;
            border: 1px solid #ccc !important;
            padding: 4px 10px !important;
            font-weight: bold;
        }
        .tool-btn:hover:not(:disabled) { background: #e0e0e0 !important; }

        /* 閱讀器主體區塊 */
        #main-container {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        /* ePub.js 渲染區域 */
        #viewer {
            flex: 1;
            background: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        /* 翻頁按鈕 */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.1);
            border: none;
            font-size: 24px;
            padding: 20px 10px;
            cursor: pointer;
            z-index: 5;
            transition: background 0.3s;
        }
        .nav-btn:hover { background: rgba(0,0,0,0.2); }
        #prev-btn { left: 0; border-radius: 0 8px 8px 0; }
        #next-btn { right: 0; border-radius: 8px 0 0 8px; }

        /* 載入中遮罩 */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            display: none; /* 預設隱藏 */
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0056b3;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 自訂彈出視窗 (Modal) 樣式 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: none; justify-content: center; align-items: center;
            z-index: 2000;
            backdrop-filter: blur(2px);
        }
        .modal-box {
            background: #fff; padding: 25px 30px; border-radius: 10px;
            max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: modalFadeIn 0.3s ease;
        }
        @keyframes modalFadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .modal-box h3 { margin-top: 0; color: #d9534f; font-size: 20px; }
        .modal-box p { font-size: 15px; color: #555; line-height: 1.6; margin-bottom: 25px; text-align: left; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
        .modal-actions button {
            padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; transition: background 0.2s;
        }
        .btn-cancel { background: #e0e0e0; color: #333; }
        .btn-cancel:hover { background: #ccc; }
        .btn-download { background: #0056b3; color: #fff; }
        .btn-download:hover { background: #004494; }

        /* ==========================================
           列印專用樣式 (@media print)
           ========================================== */
        #print-area { display: none; }

        @media print {
            body { background: #fff; }
            #controls, #main-container, #loading-overlay, .modal-overlay { display: none !important; }
            
            #print-area {
                display: block;
                width: 100%;
                font-size: 12pt; 
                line-height: 1.6;
                color: #000;
            }

            #print-area img {
                max-width: 100% !important;
                height: auto !important;
                break-inside: avoid;
            }

            .print-chapter {
                break-before: page;
                padding-top: 20px;
            }

            h1, h2, h3 { break-after: avoid; }
            p { orphans: 3; widows: 3; }
        }
    </style>
</head>
<body>

    <!-- 頂部控制列 -->
    <div id="controls">
        <div>
            <label for="file-input">📂 上傳：</label>
            <input type="file" id="file-input" accept=".epub" style="width: 180px;">
        </div>
        <div>
            <label for="url-input">🌐 網址：</label>
            <input type="text" id="url-input" placeholder="輸入 EPUB 網址" style="width: 150px;">
            <button id="load-url-btn">載入</button>
        </div>
        
        <!-- 排版微調工具 -->
        <div class="tool-group">
            <span>文字</span>
            <button id="btn-font-dec" class="tool-btn" disabled>A-</button>
            <button id="btn-font-inc" class="tool-btn" disabled>A+</button>
        </div>
        <div class="tool-group">
            <span>行距</span>
            <button id="btn-line-dec" class="tool-btn" disabled>≡-</button>
            <button id="btn-line-inc" class="tool-btn" disabled>≡+</button>
        </div>

        <div style="flex-grow: 1;"></div>
        
        <select id="toc-select" disabled>
            <option value="">目錄 (載入中...)</option>
        </select>
        <button id="print-btn" disabled>🖨️ 產生完整列印檔</button>
    </div>

    <!-- 閱讀器主體區塊 -->
    <div id="main-container">
        <div id="viewer"></div>
        <button id="prev-btn" class="nav-btn">‹</button>
        <button id="next-btn" class="nav-btn">›</button>
    </div>

    <!-- 載入中畫面 -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">載入中，請稍候...</div>
    </div>

    <!-- 自訂彈出視窗 (Modal) -->
    <div id="custom-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>⚠️ 無法直接載入此網址</h3>
            <p>因為目標網站的安全設定 (未開放 CORS)，瀏覽器阻止了我們的載入請求。</p>
            <p><strong>解決方案：</strong><br>您可以透過瀏覽器直接將檔案下載下來，然後點擊左上角的【📂 上傳】來閱讀它！</p>
            <div class="modal-actions">
                <button id="modal-cancel-btn" class="btn-cancel">取消</button>
                <button id="modal-download-btn" class="btn-download">⬇️ 直接下載</button>
            </div>
        </div>
    </div>

    <!-- 隱藏的列印區塊 -->
    <div id="print-area"></div>

    <script>
        let book = null;
        let rendition = null;
        let loadingTimeout = null; 
        
        let currentFontSize = 100;
        let currentLineHeight = 1.6;

        const fileInput = document.getElementById('file-input');
        const urlInput = document.getElementById('url-input');
        const loadUrlBtn = document.getElementById('load-url-btn');
        const tocSelect = document.getElementById('toc-select');
        const printBtn = document.getElementById('print-btn');
        const viewer = document.getElementById('viewer');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const printArea = document.getElementById('print-area');

        const customModal = document.getElementById('custom-modal');
        const modalDownloadBtn = document.getElementById('modal-download-btn');
        const modalCancelBtn = document.getElementById('modal-cancel-btn');
        let currentDownloadUrl = '';

        function showLoading(show, text = '載入中，請稍候...') {
            loadingText.textContent = text;
            loadingOverlay.style.display = show ? 'flex' : 'none';
        }

        // Modal 邏輯
        function showDownloadModal(url) {
            currentDownloadUrl = url;
            customModal.style.display = 'flex';
        }
        function hideDownloadModal() {
            customModal.style.display = 'none';
            currentDownloadUrl = '';
        }
        modalCancelBtn.addEventListener('click', hideDownloadModal);
        modalDownloadBtn.addEventListener('click', () => {
            if (currentDownloadUrl) {
                const link = document.createElement('a');
                link.href = currentDownloadUrl;
                link.target = '_blank';
                link.download = currentDownloadUrl.split('/').pop() || 'download.epub'; 
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
            hideDownloadModal();
        });

        // 排版套用邏輯
        function applyStyles() {
            if (!rendition) return;
            rendition.themes.fontSize(`${currentFontSize}%`);
            const themeName = `custom-theme-${Date.now()}`;
            rendition.themes.register(themeName, {
                "body": { "line-height": `${currentLineHeight} !important` },
                "p": { "line-height": `${currentLineHeight} !important` },
                "div": { "line-height": `${currentLineHeight} !important` }
            });
            rendition.themes.select(themeName);
        }

        document.getElementById('btn-font-dec').addEventListener('click', () => {
            currentFontSize = Math.max(80, currentFontSize - 10); applyStyles();
        });
        document.getElementById('btn-font-inc').addEventListener('click', () => {
            currentFontSize = Math.min(200, currentFontSize + 10); applyStyles();
        });
        document.getElementById('btn-line-dec').addEventListener('click', () => {
            currentLineHeight = Math.max(1.2, parseFloat((currentLineHeight - 0.2).toFixed(1))); applyStyles();
        });
        document.getElementById('btn-line-inc').addEventListener('click', () => {
            currentLineHeight = Math.min(2.4, parseFloat((currentLineHeight + 0.2).toFixed(1))); applyStyles();
        });

        // ==========================================
        // 初始化書籍流程 (已修復：移除強制 binary 避免死結，並加入 Debug 日誌)
        // ==========================================
        function initBook(bookData) {
            console.log("👉 [Debug] 1. 收到資料，準備初始化 ePub...");
            showLoading(true, '正在解析電子書結構...');
            
            // 清理舊環境
            if (book) { book.destroy(); }
            if (rendition) { viewer.innerHTML = ''; }
            tocSelect.innerHTML = '<option value="">請選擇章節...</option>';
            tocSelect.disabled = true;
            printBtn.disabled = true;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.disabled = true);

            if(loadingTimeout) clearTimeout(loadingTimeout);

            // 30秒防呆保護
            loadingTimeout = setTimeout(() => {
                if (loadingOverlay.style.display !== 'none') {
                    console.warn("👉 [Debug] 警告：處理超過 30 秒，觸發逾時警告");
                    showLoading(false);
                    alert("⚠️ 解析逾時！\n\n這本書的結構可能有損毀，或是檔案過大導致瀏覽器無法負荷。");
                    if (book) book.destroy();
                }
            }, 30000);

            try {
                // 直接將資料交給 ePub，讓其自動判斷是否為 ArrayBuffer
                book = ePub(bookData);
                console.log("👉 [Debug] 2. ePub 核心物件已建立，等待 ready...");

                book.ready.then(() => {
                    console.log("👉 [Debug] 3. 書本結構解析成功 (ready)，開始準備渲染畫面...");
                    rendition = book.renderTo("viewer", {
                        width: "100%",
                        height: "100%",
                        spread: "none"
                    });
                    return rendition.display();
                }).then(() => {
                    console.log("👉 [Debug] 4. 畫面渲染完成！解開 UI 鎖定。");
                    clearTimeout(loadingTimeout); 
                    showLoading(false);
                    printBtn.disabled = false;
                    document.querySelectorAll('.tool-btn').forEach(btn => btn.disabled = false);
                    applyStyles();
                    
                    // 繼續嘗試載入目錄
                    return book.loaded.navigation;
                }).then((nav) => {
                    console.log("👉 [Debug] 5. 開始生成目錄 (TOC)...");
                    const generateToc = (tocList, level = 0) => {
                        tocList.forEach((navItem) => {
                            let option = document.createElement('option');
                            option.value = navItem.href;
                            option.textContent = "\u00A0\u00A0".repeat(level * 2) + navItem.label;
                            tocSelect.appendChild(option);
                            if (navItem.subitems && navItem.subitems.length > 0) {
                                generateToc(navItem.subitems, level + 1);
                            }
                        });
                    };
                    if (nav && nav.toc) {
                        generateToc(nav.toc);
                        tocSelect.disabled = false;
                    }
                }).catch((err) => {
                    console.error("👉 [Debug] 發生錯誤:", err);
                    clearTimeout(loadingTimeout);
                    showLoading(false);
                    alert("電子書開啟失敗 ❌\n請按 F12 開啟開發者工具查看詳細錯誤訊息。");
                });
                
            } catch (err) {
                clearTimeout(loadingTimeout);
                showLoading(false);
                console.error("👉 [Debug] 執行 ePub 初始化發生致命錯誤:", err);
                alert("初始化發生致命錯誤。");
            }
        }

        // 從網址手動下載
        async function loadBookFromUrl(url) {
            showLoading(true, '正在下載電子書 (視檔案大小可能需要一些時間)...');
            try {
                const response = await fetch(url);
                if (!response.ok) { throw new Error(`伺服器回應錯誤: ${response.status}`); }
                const arrayBuffer = await response.arrayBuffer();
                initBook(arrayBuffer);
            } catch (error) {
                console.error("下載或 CORS 錯誤:", error);
                showLoading(false);
                showDownloadModal(url);
            }
        }

        // 監聽本機檔案上傳
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const newUrl = new URL(window.location);
            if (newUrl.searchParams.has('src')) {
                newUrl.searchParams.delete('src');
                window.history.pushState({}, '', newUrl);
            }
            urlInput.value = '';

            if (window.FileReader) {
                const reader = new FileReader();
                reader.onload = (event) => { 
                    // 檔案讀取完畢，得到 ArrayBuffer 交給 initBook
                    initBook(event.target.result); 
                };
                reader.readAsArrayBuffer(file);
            }
        });

        // 監聽網址載入
        loadUrlBtn.addEventListener('click', () => {
            const url = urlInput.value.trim();
            if (url) { 
                const newUrl = new URL(window.location);
                newUrl.searchParams.set('src', url);
                window.history.pushState({}, '', newUrl);
                loadBookFromUrl(url); 
            }
        });

        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { loadUrlBtn.click(); }
        });

        // 目錄選擇與翻頁
        tocSelect.addEventListener('change', (e) => {
            if (e.target.value) { rendition.display(e.target.value); }
        });
        document.getElementById('prev-btn').addEventListener('click', () => rendition && rendition.prev());
        document.getElementById('next-btn').addEventListener('click', () => rendition && rendition.next());
        document.addEventListener('keyup', (e) => {
            if (!rendition) return;
            if (e.key === 'ArrowLeft') rendition.prev();
            if (e.key === 'ArrowRight') rendition.next();
        });

        // 列印功能
        printBtn.addEventListener('click', async () => {
            if (!book) return;
            if (!book.archive) {
                alert("目前載入的電子書格式無法列印（需包含完整 ZIP 結構）。");
                return;
            }
            showLoading(true, '正在提取全書內容以供列印，請稍候...');
            printArea.innerHTML = ''; 
            printArea.style.fontSize = `${(currentFontSize / 100) * 12}pt`; 
            printArea.style.lineHeight = currentLineHeight;

            try {
                const spineItems = book.spine.spineItems;
                for (let i = 0; i < spineItems.length; i++) {
                    let item = spineItems[i];
                    try {
                        let doc = await book.archive.getXml(item.href);
                        if (!doc) continue;
                        let body = doc.querySelector('body');
                        if (!body) continue;

                        const images = body.querySelectorAll('img, image');
                        for (let img of images) {
                            let src = img.getAttribute('src') || img.getAttribute('href');
                            if (src && !src.startsWith('http') && !src.startsWith('data:')) {
                                const resolvePath = (base, relative) => {
                                    const stack = base.split('/');
                                    stack.pop(); 
                                    const parts = relative.split('/');
                                    for (let p of parts) {
                                        if (p === '.') continue;
                                        if (p === '..') stack.pop();
                                        else stack.push(p);
                                    }
                                    return stack.join('/');
                                };
                                let absolutePath = resolvePath(item.href, src);
                                try {
                                    let blob = await book.archive.getBlob(absolutePath);
                                    if (blob) {
                                        let objectUrl = URL.createObjectURL(blob);
                                        if(img.tagName.toLowerCase() === 'image') {
                                            img.setAttribute('href', objectUrl); 
                                        } else {
                                            img.src = objectUrl; 
                                        }
                                    }
                                } catch(imgErr) {
                                    console.warn('提取列印圖片失敗:', absolutePath, imgErr);
                                }
                            }
                        }
                        let chapterDiv = document.createElement('div');
                        chapterDiv.className = 'print-chapter';
                        chapterDiv.innerHTML = body.innerHTML;
                        printArea.appendChild(chapterDiv);
                    } catch (err) {
                        console.warn(`無法解析章節: ${item.href}`, err);
                    }
                }
                showLoading(false);
                setTimeout(() => { window.print(); }, 1000);
            } catch (error) {
                console.error("列印處理發生錯誤：", error);
                alert("列印處理失敗，請查看開發者工具(F12)的 Console。");
                showLoading(false);
            }
        });

        // 自動載入 ?src=...
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const srcUrl = params.get('src');
            if (srcUrl) {
                urlInput.value = srcUrl;
                loadBookFromUrl(srcUrl);
            }
        });
    </script>
</body>
</html>
