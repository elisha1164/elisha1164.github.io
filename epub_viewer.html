<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>純前端 EPUB 閱讀與列印工具</title>
    
    <!-- 雙色書本 Favicon (左藍、右白) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%230056b3' d='M12 21.33V6.2C10.6 5.4 9 5 7.5 5 5 5 2 6 2 6v15s3-1 5.5-1c2 0 4 .67 4.5 1.33z'/><path fill='%23ffffff' stroke='%230056b3' stroke-width='1.5' stroke-linejoin='round' d='M12 21.33V6.2C13.4 5.4 15 5 16.5 5 19 5 22 6 22 6v15s-3-1-5.5-1c-2 0-4 .67-4.5 1.33z'/></svg>" type="image/svg+xml">

    <!-- 改用更穩定、不挑網路環境的 jsdelivr CDN -->
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 頂部控制列 */
        #controls {
            background-color: #fff;
            padding: 15px 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            z-index: 10;
        }

        #controls input[type="file"], #controls input[type="text"] {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        #controls button, #controls select {
            padding: 8px 15px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        #controls button:hover { background-color: #004494; }
        #controls button:disabled { background-color: #ccc; cursor: not-allowed; }
        #controls select { background-color: #fff; color: #333; border: 1px solid #ccc; }

        /* 排版微調工具列樣式 */
        .tool-group {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #f4f4f9;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }
        .tool-group span {
            font-size: 13px;
            color: #666;
            margin-right: 4px;
            font-weight: bold;
        }
        .tool-btn {
            background: #fff !important;
            color: #333 !important;
            border: 1px solid #ccc !important;
            padding: 4px 10px !important;
            font-weight: bold;
        }
        .tool-btn:hover:not(:disabled) { background: #e0e0e0 !important; }

        /* 閱讀器主體區塊 */
        #main-container {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        /* ePub.js 渲染區域 */
        #viewer {
            flex: 1;
            background: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        /* 翻頁按鈕 */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.1);
            border: none;
            font-size: 24px;
            padding: 20px 10px;
            cursor: pointer;
            z-index: 5;
            transition: background 0.3s;
        }
        .nav-btn:hover { background: rgba(0,0,0,0.2); }
        #prev-btn { left: 0; border-radius: 0 8px 8px 0; }
        #next-btn { right: 0; border-radius: 8px 0 0 8px; }

        /* 載入中遮罩 */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            display: none; /* 預設隱藏 */
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0056b3;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 自訂彈出視窗 (Modal) 樣式 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: none; justify-content: center; align-items: center;
            z-index: 2000;
            backdrop-filter: blur(2px);
        }
        .modal-box {
            background: #fff; padding: 25px 30px; border-radius: 10px;
            max-width: 500px; width: 90%; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: modalFadeIn 0.3s ease;
        }
        @keyframes modalFadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .modal-box h3 { margin-top: 0; color: #d9534f; font-size: 20px; }
        .modal-box p { font-size: 15px; color: #555; line-height: 1.6; margin-bottom: 15px; text-align: left; }
        
        /* 圖片除錯清單區塊 */
        #debug-log-area {
            background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;
            padding: 10px; border-radius: 4px; text-align: left; font-size: 12px;
            max-height: 150px; overflow-y: auto; margin-bottom: 20px; font-family: monospace;
            word-break: break-all;
        }

        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
        .modal-actions button {
            padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; transition: background 0.2s;
        }
        .btn-cancel { background: #e0e0e0; color: #333; }
        .btn-cancel:hover { background: #ccc; }
        .btn-download { background: #0056b3; color: #fff; }
        .btn-download:hover { background: #004494; }

        /* 右下角版本標籤 */
        .version-tag {
            position: fixed;
            bottom: 5px;
            right: 5px;
            font-size: 11px;
            color: #aaa;
            z-index: 9999;
            pointer-events: none;
        }

        /* ==========================================
           列印專用樣式 (@media print)
           ========================================== */
        #print-area { display: none; }

        @media print {
            html, body { 
                height: auto !important; 
                display: block !important; 
                overflow: visible !important;
                background: #fff !important; 
            }
            
            #controls, #main-container, #loading-overlay, .modal-overlay, .version-tag { 
                display: none !important; 
            }
            
            #print-area {
                display: block !important;
                position: relative;
                width: 100%;
                font-size: 12pt; 
                line-height: 1.6;
                color: #000;
            }

            /* 確保圖片不破版 */
            #print-area img, #print-area svg, #print-area image {
                max-width: 100% !important;
                max-height: 980px !important; /* 約 A4 紙最大高度，防爆版 */
                height: auto !important;
                width: auto !important; 
                break-inside: avoid;
                page-break-inside: avoid;
                display: block; 
                margin: 0 auto; 
            }

            .print-chapter {
                break-before: page;
                padding-top: 20px;
                overflow: hidden; 
            }

            h1, h2, h3 { break-after: avoid; }
            p { orphans: 3; widows: 3; }
        }
    </style>
</head>
<body>

    <!-- 頂部控制列 -->
    <div id="controls">
        <div>
            <label for="file-input">📂 上傳：</label>
            <input type="file" id="file-input" accept=".epub" style="width: 180px;">
        </div>
        <div>
            <label for="url-input">🌐 網址：</label>
            <input type="text" id="url-input" placeholder="輸入 EPUB 網址" style="width: 150px;">
            <button id="load-url-btn">載入</button>
        </div>
        
        <!-- 排版微調工具 -->
        <div class="tool-group">
            <span>文字</span>
            <button id="btn-font-dec" class="tool-btn" disabled>A-</button>
            <button id="btn-font-inc" class="tool-btn" disabled>A+</button>
        </div>
        <div class="tool-group">
            <span>行距</span>
            <button id="btn-line-dec" class="tool-btn" disabled>≡-</button>
            <button id="btn-line-inc" class="tool-btn" disabled>≡+</button>
        </div>

        <div style="flex-grow: 1;"></div>
        
        <select id="toc-select" disabled>
            <option value="">目錄 (載入中...)</option>
        </select>
        <button id="print-btn" disabled>🖨️ 產生完整列印檔</button>
    </div>

    <!-- 閱讀器主體區塊 -->
    <div id="main-container">
        <div id="viewer"></div>
        <button id="prev-btn" class="nav-btn">‹</button>
        <button id="next-btn" class="nav-btn">›</button>
    </div>

    <!-- 載入中畫面 -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">載入中，請稍候...</div>
    </div>

    <!-- 自訂彈出視窗 (Modal) -->
    <div id="custom-modal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="modal-title">⚠️ 錯誤提示</h3>
            <p id="modal-desc">發生錯誤，請查看詳細內容。</p>
            <div id="debug-log-area" style="display: none;"></div>
            <div class="modal-actions" id="modal-actions">
                <button id="modal-cancel-btn" class="btn-cancel">取消</button>
                <button id="modal-action-btn" class="btn-download">確認</button>
            </div>
        </div>
    </div>

    <!-- 隱藏的列印區塊 -->
    <div id="print-area"></div>
    
    <!-- 部署追蹤用版號 (v1.5: 移除 srcset 干擾，拆解 SVG 封面，引入 ZIP 檔案掃描與視覺化除錯) -->
    <div class="version-tag">v1.5</div>

    <script>
        let book = null;
        let rendition = null;
        let loadingTimeout = null; 
        
        let currentFontSize = 100;
        let currentLineHeight = 1.6;

        const fileInput = document.getElementById('file-input');
        const urlInput = document.getElementById('url-input');
        const loadUrlBtn = document.getElementById('load-url-btn');
        const tocSelect = document.getElementById('toc-select');
        const printBtn = document.getElementById('print-btn');
        const viewer = document.getElementById('viewer');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const printArea = document.getElementById('print-area');

        // Modal 元素
        const customModal = document.getElementById('custom-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalDesc = document.getElementById('modal-desc');
        const debugLogArea = document.getElementById('debug-log-area');
        const modalCancelBtn = document.getElementById('modal-cancel-btn');
        const modalActionBtn = document.getElementById('modal-action-btn');

        let currentModalAction = null;

        function showLoading(show, text = '載入中，請稍候...') {
            loadingText.textContent = text;
            loadingOverlay.style.display = show ? 'flex' : 'none';
        }

        // ==========================================
        // 彈出視窗 (Modal) 共用邏輯
        // ==========================================
        function showModal(options) {
            modalTitle.textContent = options.title || '提示';
            modalDesc.innerHTML = options.desc || '';
            
            if (options.debugLogs && options.debugLogs.length > 0) {
                debugLogArea.style.display = 'block';
                debugLogArea.innerHTML = options.debugLogs.join('<br><br>');
            } else {
                debugLogArea.style.display = 'none';
                debugLogArea.innerHTML = '';
            }

            modalActionBtn.textContent = options.actionText || '確認';
            
            // 綁定確認按鈕行為
            currentModalAction = () => {
                if (options.onAction) options.onAction();
                customModal.style.display = 'none';
            };
            modalActionBtn.onclick = currentModalAction;
            
            customModal.style.display = 'flex';
        }

        modalCancelBtn.addEventListener('click', () => {
            customModal.style.display = 'none';
        });

        // 排版套用邏輯
        function applyStyles() {
            if (!rendition) return;
            rendition.themes.fontSize(`${currentFontSize}%`);
            const themeName = `custom-theme-${Date.now()}`;
            rendition.themes.register(themeName, {
                "body": { "line-height": `${currentLineHeight} !important` },
                "p": { "line-height": `${currentLineHeight} !important` },
                "div": { "line-height": `${currentLineHeight} !important` }
            });
            rendition.themes.select(themeName);
        }

        document.getElementById('btn-font-dec').addEventListener('click', () => {
            currentFontSize = Math.max(80, currentFontSize - 10); applyStyles();
        });
        document.getElementById('btn-font-inc').addEventListener('click', () => {
            currentFontSize = Math.min(200, currentFontSize + 10); applyStyles();
        });
        document.getElementById('btn-line-dec').addEventListener('click', () => {
            currentLineHeight = Math.max(1.2, parseFloat((currentLineHeight - 0.2).toFixed(1))); applyStyles();
        });
        document.getElementById('btn-line-inc').addEventListener('click', () => {
            currentLineHeight = Math.min(2.4, parseFloat((currentLineHeight + 0.2).toFixed(1))); applyStyles();
        });

        // ==========================================
        // 初始化書籍流程
        // ==========================================
        function initBook(bookData) {
            if (typeof ePub === 'undefined') {
                showLoading(false);
                alert("⚠️ 核心套件載入失敗 (ePub is not defined)！\n\n請嘗試重新整理網頁，或檢查網路環境。");
                return;
            }

            showLoading(true, '正在解析電子書結構...');
            
            if (book) { book.destroy(); }
            if (rendition) { viewer.innerHTML = ''; }
            tocSelect.innerHTML = '<option value="">請選擇章節...</option>';
            tocSelect.disabled = true;
            printBtn.disabled = true;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.disabled = true);

            if(loadingTimeout) clearTimeout(loadingTimeout);

            loadingTimeout = setTimeout(() => {
                if (loadingOverlay.style.display !== 'none') {
                    showLoading(false);
                    alert("⚠️ 解析逾時！\n\n這本書的結構可能有損毀，或是檔案過大導致瀏覽器無法負荷。");
                    if (book) book.destroy();
                }
            }, 30000);

            try {
                book = ePub(bookData);
                
                book.ready.then(() => {
                    rendition = book.renderTo("viewer", {
                        width: "100%",
                        height: "100%",
                        spread: "none"
                    });
                    return rendition.display();
                }).then(() => {
                    clearTimeout(loadingTimeout); 
                    showLoading(false);
                    printBtn.disabled = false;
                    document.querySelectorAll('.tool-btn').forEach(btn => btn.disabled = false);
                    applyStyles();
                    
                    return book.loaded.navigation;
                }).then((nav) => {
                    const generateToc = (tocList, level = 0) => {
                        tocList.forEach((navItem) => {
                            let option = document.createElement('option');
                            option.value = navItem.href;
                            option.textContent = "\u00A0\u00A0".repeat(level * 2) + navItem.label;
                            tocSelect.appendChild(option);
                            if (navItem.subitems && navItem.subitems.length > 0) {
                                generateToc(navItem.subitems, level + 1);
                            }
                        });
                    };
                    if (nav && nav.toc) {
                        generateToc(nav.toc);
                        tocSelect.disabled = false;
                    }
                }).catch((err) => {
                    clearTimeout(loadingTimeout);
                    showLoading(false);
                    console.error("電子書解析過程中失敗:", err);
                    alert("電子書開啟失敗 ❌\n請確認檔案格式是否受損。");
                });
                
            } catch (err) {
                clearTimeout(loadingTimeout);
                showLoading(false);
                console.error("執行 ePub 初始化發生致命錯誤:", err);
                alert("初始化發生致命錯誤 ❌");
            }
        }

        // 從網址手動下載
        async function loadBookFromUrl(url) {
            showLoading(true, '正在下載電子書 (視檔案大小可能需要一些時間)...');
            try {
                const response = await fetch(url);
                if (!response.ok) { throw new Error(`伺服器回應錯誤: ${response.status}`); }
                const arrayBuffer = await response.arrayBuffer();
                initBook(arrayBuffer);
            } catch (error) {
                showLoading(false);
                showModal({
                    title: '⚠️ 無法直接載入此網址',
                    desc: '因為目標網站的安全設定 (未開放 CORS)，瀏覽器阻止了我們的載入請求。<br><br><strong>解決方案：</strong><br>您可以直接下載該檔案，再透過【📂 上傳】來閱讀它！',
                    actionText: '⬇️ 直接下載',
                    onAction: () => {
                        const link = document.createElement('a');
                        link.href = url;
                        link.target = '_blank';
                        link.download = url.split('/').pop() || 'download.epub'; 
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                    }
                });
            }
        }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const newUrl = new URL(window.location);
            if (newUrl.searchParams.has('src')) {
                newUrl.searchParams.delete('src');
                window.history.pushState({}, '', newUrl);
            }
            urlInput.value = '';

            if (window.FileReader) {
                const reader = new FileReader();
                reader.onload = (event) => { initBook(event.target.result); };
                reader.readAsArrayBuffer(file);
            }
        });

        loadUrlBtn.addEventListener('click', () => {
            const url = urlInput.value.trim();
            if (url) { 
                const newUrl = new URL(window.location);
                newUrl.searchParams.set('src', url);
                window.history.pushState({}, '', newUrl);
                loadBookFromUrl(url); 
            }
        });

        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { loadUrlBtn.click(); }
        });

        tocSelect.addEventListener('change', (e) => {
            if (e.target.value) { rendition.display(e.target.value); }
        });
        document.getElementById('prev-btn').addEventListener('click', () => rendition && rendition.prev());
        document.getElementById('next-btn').addEventListener('click', () => rendition && rendition.next());
        document.addEventListener('keyup', (e) => {
            if (!rendition) return;
            if (e.key === 'ArrowLeft') rendition.prev();
            if (e.key === 'ArrowRight') rendition.next();
        });

        // ==========================================
        // 列印功能 (v1.5 終極圖片提取修復)
        // ==========================================
        printBtn.addEventListener('click', async () => {
            if (!book) return;
            showLoading(true, '正在提取全書內容以供列印，可能需要數十秒的時間，請稍候...');
            printArea.innerHTML = ''; 
            
            printArea.style.fontSize = `${(currentFontSize / 100) * 12}pt`; 
            printArea.style.lineHeight = currentLineHeight;

            let failedImagesLogs = []; // 收集解析失敗的圖片日誌

            try {
                const spineItems = book.spine.spineItems;
                for (let i = 0; i < spineItems.length; i++) {
                    let item = spineItems[i];
                    try {
                        await item.load(book.load.bind(book));
                        let body = item.document ? item.document.querySelector('body') : null;

                        if (!body && book.archive) {
                            let doc = await book.archive.getXml(item.href);
                            body = doc ? doc.querySelector('body') : null;
                        }

                        if (!body) continue;

                        // ========================================
                        // 處理地雷 1：強制拆解 SVG 封面包裝 (解決空白頁)
                        // ========================================
                        const svgs = body.querySelectorAll('svg');
                        for (let svg of svgs) {
                            const svgImage = svg.querySelector('image');
                            if (svgImage) {
                                let src = svgImage.getAttribute('href') || svgImage.getAttribute('xlink:href') || svgImage.getAttributeNS('http://www.w3.org/1999/xlink', 'href');
                                if (src) {
                                    const newImg = document.createElement('img');
                                    newImg.setAttribute('src', src);
                                    svg.parentNode.replaceChild(newImg, svg);
                                }
                            }
                        }

                        // ========================================
                        // 處理地雷 2：提取所有圖片與處理相對路徑
                        // ========================================
                        const images = body.querySelectorAll('img');
                        for (let img of images) {
                            
                            // 拔除 srcset，避免瀏覽器忽略我們的 src 跑去網路抓圖導致破圖
                            img.removeAttribute('srcset'); 
                            
                            let src = img.getAttribute('src');
                            if (src && !src.startsWith('http') && !src.startsWith('data:')) {
                                
                                // 清除網址參數
                                let cleanSrc = src.split('#')[0].split('?')[0];
                                let absolutePath = "";

                                try {
                                    // 確保利用 URL 物件正確解析 "../" 這種相對路徑
                                    const base = new URL(item.href, 'http://dummy.com/');
                                    const target = new URL(cleanSrc, base);
                                    
                                    // 解碼 URL (解決檔名包含空白或中文字導致的找不到檔案問題)
                                    absolutePath = decodeURIComponent(target.pathname.substring(1));
                                } catch (e) {
                                    absolutePath = decodeURIComponent(cleanSrc);
                                }
                                
                                try {
                                    let blob = await book.archive.getBlob(absolutePath);
                                    
                                    // 【全域掃描機制】如果正常路徑抓不到，直接全域搜尋檔名
                                    if (!blob && book.archive.zip && book.archive.zip.files) {
                                        const filename = absolutePath.split('/').pop();
                                        const zipFiles = Object.keys(book.archive.zip.files);
                                        for (let fileKey of zipFiles) {
                                            if (fileKey.endsWith(filename)) {
                                                blob = await book.archive.getBlob(fileKey);
                                                if (blob) {
                                                    absolutePath = fileKey; // 找到了真正的內部路徑
                                                    break;
                                                }
                                            }
                                        }
                                    }

                                    if (blob) {
                                        let objectUrl = URL.createObjectURL(blob);
                                        img.src = objectUrl; 
                                    } else {
                                        failedImagesLogs.push(`章節: ${item.href}<br>圖片 SRC: ${src}<br>尋找路徑: ${absolutePath}`);
                                    }
                                } catch(imgErr) {
                                    failedImagesLogs.push(`章節: ${item.href}<br>提取錯誤: ${imgErr.toString()}`);
                                }
                            }
                        }
                        
                        let chapterDiv = document.createElement('div');
                        chapterDiv.className = 'print-chapter';
                        chapterDiv.innerHTML = body.innerHTML;
                        printArea.appendChild(chapterDiv);

                        item.unload();

                    } catch (err) {
                        console.warn(`無法解析章節: ${item.href}`, err);
                    }
                }
                
                showLoading(false);
                
                // 如果有圖片遺失，顯示除錯面板！
                if (failedImagesLogs.length > 0) {
                    showModal({
                        title: '⚠️ 發現部分圖片遺失',
                        desc: `在準備列印檔的過程中，有 <strong>${failedImagesLogs.length}</strong> 張圖片無法從檔案中提取。<br>您可以選擇繼續列印，或將下方的除錯資訊截圖回報。`,
                        debugLogs: failedImagesLogs,
                        actionText: '🖨️ 忽略並繼續列印',
                        onAction: () => {
                            setTimeout(() => { window.print(); }, 500);
                        }
                    });
                } else {
                    // 一切順利，直接觸發列印
                    setTimeout(() => { window.print(); }, 1000);
                }

            } catch (error) {
                console.error("列印處理發生錯誤：", error);
                alert("列印處理失敗，請查看開發者工具(F12)的 Console。");
                showLoading(false);
            }
        });

        // 自動載入 ?src=...
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const srcUrl = params.get('src');
            if (srcUrl) {
                urlInput.value = srcUrl;
                loadBookFromUrl(srcUrl);
            }
        });
    </script>
</body>
</html>
