<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>純前端 EPUB 閱讀與列印工具</title>
    <!-- 引入 JSZip (ePub.js 依賴) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- 引入 ePub.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.3.93/epub.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 頂部控制列 */
        #controls {
            background-color: #fff;
            padding: 15px 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            z-index: 10;
        }

        #controls input[type="file"], #controls input[type="text"] {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        #controls button, #controls select {
            padding: 8px 15px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        #controls button:hover { background-color: #004494; }
        #controls button:disabled { background-color: #ccc; cursor: not-allowed; }
        #controls select { background-color: #fff; color: #333; border: 1px solid #ccc; }

        /* 排版微調工具列樣式 */
        .tool-group {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #f4f4f9;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }
        .tool-group span {
            font-size: 13px;
            color: #666;
            margin-right: 4px;
            font-weight: bold;
        }
        .tool-btn {
            background: #fff !important;
            color: #333 !important;
            border: 1px solid #ccc !important;
            padding: 4px 10px !important;
            font-weight: bold;
        }
        .tool-btn:hover:not(:disabled) { background: #e0e0e0 !important; }

        /* 閱讀器主體區塊 */
        #main-container {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        /* ePub.js 渲染區域 */
        #viewer {
            flex: 1;
            background: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        /* 翻頁按鈕 */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.1);
            border: none;
            font-size: 24px;
            padding: 20px 10px;
            cursor: pointer;
            z-index: 5;
            transition: background 0.3s;
        }
        .nav-btn:hover { background: rgba(0,0,0,0.2); }
        #prev-btn { left: 0; border-radius: 0 8px 8px 0; }
        #next-btn { right: 0; border-radius: 8px 0 0 8px; }

        /* 載入中遮罩 */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            display: none; /* 預設隱藏 */
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0056b3;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ==========================================
           列印專用樣式 (@media print)
           ========================================== */
        #print-area { display: none; } /* 螢幕上隱藏列印區塊 */

        @media print {
            body { background: #fff; }
            #controls, #main-container, #loading-overlay { display: none !important; }
            
            #print-area {
                display: block;
                width: 100%;
                /* 基礎值，實際會被 JS 覆蓋以匹配使用者設定 */
                font-size: 12pt; 
                line-height: 1.6;
                color: #000;
            }

            #print-area img {
                max-width: 100% !important;
                height: auto !important;
                break-inside: avoid;
            }

            .print-chapter {
                break-before: page;
                padding-top: 20px;
            }

            h1, h2, h3 { break-after: avoid; }
            p { orphans: 3; widows: 3; }
        }
    </style>
</head>
<body>

    <!-- 頂部控制列 -->
    <div id="controls">
        <div>
            <label for="file-input">📂 上傳：</label>
            <input type="file" id="file-input" accept=".epub" style="width: 180px;">
        </div>
        <div>
            <label for="url-input">🌐 網址：</label>
            <input type="text" id="url-input" placeholder="輸入 EPUB 網址" style="width: 150px;">
            <button id="load-url-btn">載入</button>
        </div>
        
        <!-- 排版微調工具 -->
        <div class="tool-group">
            <span>文字</span>
            <button id="btn-font-dec" class="tool-btn" disabled>A-</button>
            <button id="btn-font-inc" class="tool-btn" disabled>A+</button>
        </div>
        <div class="tool-group">
            <span>行距</span>
            <button id="btn-line-dec" class="tool-btn" disabled>≡-</button>
            <button id="btn-line-inc" class="tool-btn" disabled>≡+</button>
        </div>

        <div style="flex-grow: 1;"></div>
        
        <select id="toc-select" disabled>
            <option value="">目錄 (載入中...)</option>
        </select>
        <button id="print-btn" disabled>🖨️ 產生完整列印檔</button>
    </div>

    <!-- 閱讀器主體區塊 -->
    <div id="main-container">
        <div id="viewer"></div>
        <button id="prev-btn" class="nav-btn">‹</button>
        <button id="next-btn" class="nav-btn">›</button>
    </div>

    <!-- 載入中畫面 -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">載入中，請稍候...</div>
    </div>

    <!-- 隱藏的列印區塊 (僅在按下 ctrl+P 時生效) -->
    <div id="print-area"></div>

    <script>
        let book = null;
        let rendition = null;
        
        // 儲存使用者的排版偏好
        let currentFontSize = 100; // 預設 100%
        let currentLineHeight = 1.6; // 預設行距 1.6

        const fileInput = document.getElementById('file-input');
        const urlInput = document.getElementById('url-input');
        const loadUrlBtn = document.getElementById('load-url-btn');
        const tocSelect = document.getElementById('toc-select');
        const printBtn = document.getElementById('print-btn');
        const viewer = document.getElementById('viewer');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const printArea = document.getElementById('print-area');

        // 控制載入動畫
        function showLoading(show, text = '載入中，請稍候...') {
            loadingText.textContent = text;
            loadingOverlay.style.display = show ? 'flex' : 'none';
        }

        // ==========================================
        // 排版套用邏輯 (動態更新 ePub.js 樣式)
        // ==========================================
        function applyStyles() {
            if (!rendition) return;
            
            // 1. 調整字體大小 (內建 API)
            rendition.themes.fontSize(`${currentFontSize}%`);
            
            // 2. 調整行距 (透過注入 custom theme 覆蓋預設 CSS)
            // 為了讓它強制即時生效，我們每次都註冊一個新的隨機主題名稱
            const themeName = `custom-theme-${Date.now()}`;
            rendition.themes.register(themeName, {
                "body": { "line-height": `${currentLineHeight} !important` },
                "p": { "line-height": `${currentLineHeight} !important` },
                "div": { "line-height": `${currentLineHeight} !important` }
            });
            rendition.themes.select(themeName);
        }

        // 綁定排版微調按鈕事件
        document.getElementById('btn-font-dec').addEventListener('click', () => {
            currentFontSize = Math.max(80, currentFontSize - 10); // 下限 80%
            applyStyles();
        });
        document.getElementById('btn-font-inc').addEventListener('click', () => {
            currentFontSize = Math.min(200, currentFontSize + 10); // 上限 200%
            applyStyles();
        });
        document.getElementById('btn-line-dec').addEventListener('click', () => {
            currentLineHeight = Math.max(1.2, parseFloat((currentLineHeight - 0.2).toFixed(1))); // 下限 1.2
            applyStyles();
        });
        document.getElementById('btn-line-inc').addEventListener('click', () => {
            currentLineHeight = Math.min(2.4, parseFloat((currentLineHeight + 0.2).toFixed(1))); // 上限 2.4
            applyStyles();
        });

        // 初始化書籍並渲染
        function initBook(bookData) {
            showLoading(true, '正在解析電子書...');
            
            // 清理舊的實例
            if (book) { book.destroy(); }
            if (rendition) { viewer.innerHTML = ''; }
            tocSelect.innerHTML = '<option value="">請選擇章節...</option>';
            tocSelect.disabled = true;
            printBtn.disabled = true;
            
            // 停用工具列按鈕直到載入完成
            document.querySelectorAll('.tool-btn').forEach(btn => btn.disabled = true);

            // 建立新的 ePub 實例
            book = ePub(bookData);
            
            // 處理載入失敗 (如 CORS 錯誤、網址失效或無效檔案)
            book.opened.catch(err => {
                showLoading(false);
                console.error("電子書載入失敗:", err);
                if (typeof bookData === 'string' && (bookData.startsWith('http://') || bookData.startsWith('https://'))) {
                    const wantDownload = confirm("⚠️ 無法直接載入此網址 (可能是目標網站未開放 CORS 跨域權限)。\n\n請問是否要透過瀏覽器「直接下載」該檔案？\n(下載完成後，您可以再次點擊左側的【📂 本機上傳】來閱讀它)");
                    if (wantDownload) { window.open(bookData, '_blank'); }
                } else {
                    alert("檔案解析失敗，請確認是否為完整的 EPUB 檔案。");
                }
            });

            // 渲染書籍到 #viewer
            rendition = book.renderTo("viewer", {
                width: "100%",
                height: "100%",
                spread: "none" // 單頁顯示，適合網頁瀏覽
            });

            rendition.display().then(() => {
                showLoading(false);
                printBtn.disabled = false;
                // 啟用排版工具按鈕並套用偏好設定
                document.querySelectorAll('.tool-btn').forEach(btn => btn.disabled = false);
                applyStyles();
            }).catch(() => {
                showLoading(false);
            });

            // 解析並產生目錄
            book.loaded.navigation.then((nav) => {
                const generateToc = (tocList, level = 0) => {
                    tocList.forEach((navItem) => {
                        let option = document.createElement('option');
                        option.value = navItem.href;
                        option.textContent = "\u00A0\u00A0".repeat(level * 2) + navItem.label;
                        tocSelect.appendChild(option);
                        if (navItem.subitems && navItem.subitems.length > 0) {
                            generateToc(navItem.subitems, level + 1);
                        }
                    });
                };
                if (nav && nav.toc) {
                    generateToc(nav.toc);
                    tocSelect.disabled = false;
                }
            });
        }

        // 監聽本機檔案上傳
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const newUrl = new URL(window.location);
            if (newUrl.searchParams.has('src')) {
                newUrl.searchParams.delete('src');
                window.history.pushState({}, '', newUrl);
            }
            urlInput.value = '';

            if (window.FileReader) {
                const reader = new FileReader();
                reader.onload = (event) => { initBook(event.target.result); };
                reader.readAsArrayBuffer(file);
            }
        });

        // 監聽網址載入
        loadUrlBtn.addEventListener('click', () => {
            const url = urlInput.value.trim();
            if (url) { 
                const newUrl = new URL(window.location);
                newUrl.searchParams.set('src', url);
                window.history.pushState({}, '', newUrl);
                initBook(url); 
            }
        });

        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { loadUrlBtn.click(); }
        });

        // 目錄選擇跳轉
        tocSelect.addEventListener('change', (e) => {
            if (e.target.value) { rendition.display(e.target.value); }
        });

        // 翻頁功能
        document.getElementById('prev-btn').addEventListener('click', () => rendition && rendition.prev());
        document.getElementById('next-btn').addEventListener('click', () => rendition && rendition.next());

        document.addEventListener('keyup', (e) => {
            if (!rendition) return;
            if (e.key === 'ArrowLeft') rendition.prev();
            if (e.key === 'ArrowRight') rendition.next();
        });

        // ==========================================
        // 核心難點：客製化「完整書籍列印」功能
        // ==========================================
        printBtn.addEventListener('click', async () => {
            if (!book) return;
            
            if (!book.archive) {
                alert("目前列印功能僅支援「本機上傳」的 EPUB 檔案（需包含完整 ZIP 結構）。");
                return;
            }

            showLoading(true, '正在提取全書內容以供列印，請稍候...');
            printArea.innerHTML = ''; 
            
            // 將使用者的排版偏好套用到列印區塊！
            // 將 % 轉換為 pt 單位 (假設 100% 約等於 12pt 適合列印)
            printArea.style.fontSize = `${(currentFontSize / 100) * 12}pt`; 
            printArea.style.lineHeight = currentLineHeight;

            try {
                const spineItems = book.spine.spineItems;
                
                for (let i = 0; i < spineItems.length; i++) {
                    let item = spineItems[i];
                    try {
                        let doc = await book.archive.getXml(item.href);
                        if (!doc) continue;

                        let body = doc.querySelector('body');
                        if (!body) continue;

                        const images = body.querySelectorAll('img, image');
                        for (let img of images) {
                            let src = img.getAttribute('src') || img.getAttribute('href');
                            if (src && !src.startsWith('http') && !src.startsWith('data:')) {
                                const resolvePath = (base, relative) => {
                                    const stack = base.split('/');
                                    stack.pop(); 
                                    const parts = relative.split('/');
                                    for (let p of parts) {
                                        if (p === '.') continue;
                                        if (p === '..') stack.pop();
                                        else stack.push(p);
                                    }
                                    return stack.join('/');
                                };
                                let absolutePath = resolvePath(item.href, src);
                                try {
                                    let blob = await book.archive.getBlob(absolutePath);
                                    if (blob) {
                                        let objectUrl = URL.createObjectURL(blob);
                                        if(img.tagName.toLowerCase() === 'image') {
                                            img.setAttribute('href', objectUrl); 
                                        } else {
                                            img.src = objectUrl; 
                                        }
                                    }
                                } catch(imgErr) {
                                    console.warn('提取列印圖片失敗:', absolutePath, imgErr);
                                }
                            }
                        }

                        let chapterDiv = document.createElement('div');
                        chapterDiv.className = 'print-chapter';
                        chapterDiv.innerHTML = body.innerHTML;
                        printArea.appendChild(chapterDiv);

                    } catch (err) {
                        console.warn(`無法解析章節: ${item.href}`, err);
                    }
                }

                showLoading(false);
                setTimeout(() => { window.print(); }, 1000);

            } catch (error) {
                console.error("列印處理發生錯誤：", error);
                alert("列印處理失敗，請查看開發者工具(F12)的 Console。");
                showLoading(false);
            }
        });

        // 自動載入 ?src=...
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const srcUrl = params.get('src');
            if (srcUrl) {
                urlInput.value = srcUrl;
                initBook(srcUrl);
            }
        });
    </script>
</body>
</html>
