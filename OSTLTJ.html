    <script>
        // --- 變數與狀態 ---
        let bibleData = {}; 
        let rcuvIndex = {}; 
        let videoData = {}; 
        
        let currentDay = 1;
        const synth = window.speechSynthesis;
        let voices = []; 
        let readProgress = JSON.parse(localStorage.getItem('gemini_read_progress') || '{}');
        let currentViewMode = 'chinese'; 
        let activeVideoLang = 'ch';
        let wakeLock = null;

        // --- 網頁載入時間戳記 (用於 24 小時強制重整) ---
        const APP_LOAD_TIME = Date.now();
        const TWENTY_FOUR_HOURS = 24 * 60 * 60 * 1000; 

        // --- 螢幕喚醒鎖 (Wake Lock API) 控制機制 ---
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } 
                catch (err) { console.error(`Wake Lock 錯誤: ${err.name}, ${err.message}`); }
            }
        }
        function releaseWakeLock() {
            if (wakeLock !== null) wakeLock.release().then(() => { wakeLock = null; });
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                if (Date.now() - APP_LOAD_TIME > TWENTY_FOUR_HOURS) window.location.reload();
                if (window._currentSpeechCancel || synth.speaking) requestWakeLock();
            }
        });

        // --- 複製網址工具 (防範 APP 內建瀏覽器) ---
        window.copyAppUrl = function() {
            var dummy = document.createElement('input');
            document.body.appendChild(dummy);
            dummy.value = window.location.href;
            dummy.select();
            try {
                document.execCommand('copy');

        // --- 核心工具函數 ---
        function cleanString(str) {
            if (str === null || str === undefined) return '';
            return String(str).replace(/[\s\uFEFF\u200B-\u200D\r\n]/g, '');
        }

        // 🔥 更新：單純依賴標題的智慧分離演算法 🔥
        function splitContentAndQuestions(text) {
            if (!text) return { main: "", questions: "" };
            const lines = text.split('\n');
            let headerIdx = -1;
            
            // 從底部往上找，尋找「反思問題」或「Reflection Questions」等關鍵字
            for (let i = lines.length - 1; i >= 0; i--) {
                const line = lines[i].trim();
                // 條件：開頭符合關鍵字，且該行字數小於 30 字 (防呆：避免剛好以這些字開頭的長段落被誤認)
                if (/^(反思問題|反思|問題|Reflection Questions|Reflection|Questions)/i.test(line) && line.length < 30) {
                    headerIdx = i;
                    break;
                }
            }
            
            // 如果找到了，就進行分離
            if (headerIdx !== -1) {
                return {
                    // 主文：標題之前的所有內容
                    main: lines.slice(0, headerIdx).join('\n').trim(),
                    // 問題：刻意從 headerIdx + 1 開始，直接拋棄掉原本寫在內文的「反思問題」標題
                    questions: lines.slice(headerIdx + 1).join('\n').trim()
                };
            }
            return { main: text.trim(), questions: "" };
        }

        // 預先解析經文章節
        function parseChaptersWithVerses(chaptersStr) {
            if (!chaptersStr) return [];
            const cleanStr = cleanString(chaptersStr).replace(/到/g, '-');
            if (cleanStr === '') return [];
            
            const results = [];
            const parts = cleanStr.split(',');
            
            parts.forEach(part => {
                let vStart = null, vEnd = null;
                let chapterPart = part;
                
                if (chapterPart.includes(':')) {
                    const splitColon = chapterPart.split(':');
                    chapterPart = splitColon[0]; 
                    const vs = splitColon[1]; 
                    
                    if (vs && vs.includes('-')) {
                        const vSplit = vs.split('-');
                        vStart = parseInt(vSplit[0]);
                        vEnd = parseInt(vSplit[1]);
                    } else if (vs) {
                        vStart = parseInt(vs);
                        vEnd = parseInt(vs);
                    }
                }
                
                if (chapterPart.includes('-')) {
                    const chSplit = chapterPart.split('-');
                    const start = parseInt(chSplit[0]);
                    const end = parseInt(chSplit[1]);
                    for (let i = start; i <= end; i++) {
                        if (!isNaN(i)) results.push({ ch: i.toString(), vStart, vEnd });
                    }
                } else {
                    const num = parseInt(chapterPart);
                    if (!isNaN(num)) results.push({ ch: num.toString(), vStart, vEnd });
                }
            });
            return results;
        }

        function calculateCurrentDay(startDateStr) {
            if (!startDateStr) return null;
            const parts = startDateStr.split('-');
            const startDate = new Date(parts[0], parts[1] - 1, parts[2]); 
            startDate.setHours(0, 0, 0, 0);
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const diffTime = today.getTime() - startDate.getTime();
            const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));
            
            let targetDay = diffDays + 1;
            if (targetDay < 1) targetDay = 1;
            if (targetDay > 358) targetDay = 358;
            return targetDay;
        }

        function populateVoiceList() {

            dom.voiceSelector.innerHTML = voices.length ? '' : '<option value="">(系統無可用中文語音)</option>';

            const savedVoiceName = localStorage.getItem('tts_voice_name');

                option.textContent = voice.name.replace('Microsoft ', '').replace('Google ', '');

                if (savedVoiceName === voice.name || (!savedVoiceName && (voice.name.includes('HsiaoChen') || voice.name.includes('國語')))) option.selected = true;
                dom.voiceSelector.appendChild(option);
            });
        }

        async function loadCSVs() {
            dom.statusText.textContent = "正在從伺服器下載 CSV 資料...";
            dom.statusText.classList.remove('hidden'); // 確保開始載入時顯示

            const fetchCsv = async url => {
                try {
                    const res = await fetch(url);
                    if (!res.ok) return null;
                    const buf = await res.arrayBuffer();
                    try { return new TextDecoder('utf-8', { fatal: true }).decode(buf).replace(/^\uFEFF/, ''); }
                    catch { return new TextDecoder('big5').decode(buf).replace(/^\uFEFF/, ''); }
                } catch { return null; }
            };

            try {
                const [metaStr, contentStr, transStr, rcuvStr, videoStr] = await Promise.all([
                    fetchCsv('./bible_metadata.csv'), fetchCsv('./bible_reading_plan.csv'),
                    fetchCsv('./bible_reading_plan_translated.csv'), fetchCsv('./rcuv.csv'), fetchCsv('./bible_reading_plan_videos.csv')
                ]);
                if (!metaStr || !contentStr || !transStr) throw new Error("主要檔案讀取失敗 (可能缺少 bible_reading_plan_translated.csv)");

                const parseOpts = { header: true, skipEmptyLines: true, transformHeader: h => cleanString(h).toLowerCase() };
                const [meta, content, trans] = [Papa.parse(metaStr, parseOpts).data, Papa.parse(contentStr, parseOpts).data, Papa.parse(transStr, parseOpts).data];
                
                rcuvIndex = {};
                if (rcuvStr) {
                    Papa.parse(rcuvStr, parseOpts).data.forEach(row => {
                        const rawBook = row.book || '', rawChap = (row.chapter || '').toString();
                        const cBook = cleanString(rawBook);
                        if (!cBook) return;
                        if (!rcuvIndex[cBook]) rcuvIndex[cBook] = [];
                        rcuvIndex[cBook].push({
                            c: cleanString(rawChap),
                            v: (row.verse || '').toString(),
                            n: parseInt(row.verse) || 0,
                            t: (row.text || '').replace(/【.*?】/g, '')
                        });
                    });
                }

                videoData = {};
                if (videoStr) {
                    Papa.parse(videoStr, parseOpts).data.forEach(row => {
                        const day = parseInt(row.day);
                        if (!isNaN(day)) videoData[day] = { enTitle: row.en_title || '', enLink: row.en_youtubelink || '', chTitle: row.ch_title || '', chLink: row.ch_youtubelink || '' };
                    });
                }

                let currentBook = "";
                bibleData = {};
                meta.forEach(row => {
                    const day = parseInt(row.day);
                    if (isNaN(day)) return;
                    if (cleanString(row.book)) currentBook = (row.book || "").trim();
                    bibleData[day] = {
                        book: currentBook,
                        chapters: row.chapters || "",
                        psalms: row.psalms || "",
                        parsedChapters: parseChaptersWithVerses(row.chapters),
                        parsedPsalms: parseChaptersWithVerses(row.psalms),
                        contentEn: { main: "", questions: "" }, 
                        contentCh: { main: "", questions: "" }
                    };
                });
                
                // 載入時直接將內文分離為 main 和 questions
                content.forEach(row => { 
                    const d = parseInt(row.day); 
                    if (!isNaN(d) && bibleData[d]) bibleData[d].contentEn = splitContentAndQuestions(row.content || ""); 
                });
                trans.forEach(row => { 
                    const d = parseInt(row.day); 
                    if (!isNaN(d) && bibleData[d]) bibleData[d].contentCh = splitContentAndQuestions(row.chinese_translation || ""); 
                });

                // 💡 核心修改：資料載入成功後，直接隱藏狀態文字
                dom.statusText.classList.add('hidden');
                dom.readingSection.classList.remove('opacity-50', 'pointer-events-none');
                
                let firstUnreadDay = 358;
                for (let i = 1; i <= 358; i++) { if (!readProgress[i]) { firstUnreadDay = i; break; } }
                changeDay(firstUnreadDay);

                if (!localStorage.getItem('tour_completed')) setTimeout(startTour, 800);
            } catch (error) {
                console.error("CSV 載入錯誤:", error);
                dom.statusText.classList.remove('hidden'); // 發生錯誤時確保顯示出來
                
                if (/Line|LINE|FBAV|FBAN|Instagram/.test(navigator.userAgent)) {
                    dom.statusText.innerHTML = `❌ 載入被阻擋。<br><span class="text-sm text-red-600 font-bold bg-red-50 px-4 py-3 rounded-xl inline-block mt-3 text-left shadow-sm">⚠️ 偵測到您正使用 APP 內建瀏覽器，這會阻擋資料載入。<br><br>👉 建議解法一：請點擊角落選單，選擇「使用預設瀏覽器開啟」<br>👉 建議解法二：直接點擊下方按鈕複製網址<br><button onclick="window.copyAppUrl()" class="mt-4 w-full bg-amber-100 text-amber-800 hover:bg-amber-200 px-4 py-2.5 rounded-lg text-sm font-bold shadow-sm transition flex items-center justify-center"><svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>一鍵複製網址</button></span>`;
                } else {
                    dom.statusText.innerHTML = `❌ 載入失敗。<br><span class="text-sm text-red-500">發生錯誤：${error.message}。請確認所有必要的 CSV 檔案皆已上傳。</span>`;
                }
            }
        }

        function changeDay(day) {
            if (day < 1 || day > 358) return;
            handleStop(); 
            currentDay = day;
            dom.daySelector.value = day;
            
            const data = bibleData[day];
            if (!data) return (dom.displayTitle.textContent = `找不到 Day ${day} 的資料`);

            const isRead = !!readProgress[day];
            dom.readProgressCheckbox.checked = isRead;
            dom.displayTitle.textContent = `全年讀經第${day.toString().padStart(3, '0')}天 ${data.book}第${data.chapters ? data.chapters.replace("-", "到") : ""}章、詩篇第${data.psalms}篇`;
            updateHeaderVisuals(day, isRead);

            const savedStartDate = localStorage.getItem('gemini_start_date');
            if (savedStartDate) {
                const date = new Date(savedStartDate);
                date.setHours(0, 0, 0, 0);
                date.setDate(date.getDate() + (day - 1));
                dom.absoluteDateDisplay.textContent = date.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
                dom.absoluteDateDisplay.classList.remove('hidden');
            } else dom.absoluteDateDisplay.classList.add('hidden');
            
            // 指派分離後的純主文到靈修區塊
            dom.originalText.textContent = data.contentEn.main || "此天無英文靈修資料。";
            dom.translatedText.textContent = data.contentCh.main || "此天無中文靈修資料。";
            setViewMode('chinese'); // setViewMode 會一併處理 reflectionText 的顯示與隱藏

            const vData = videoData[day];
            activeVideoLang = (vData && vData.chLink) ? 'ch' : 'en';
            if (vData && (vData.chLink || vData.enLink)) {
                updateVideoDisplay(vData, activeVideoLang);
                dom.videoSection.classList.remove('hidden');
                if (vData.chLink && vData.enLink) {
                    dom.toggleVideoBtn.classList.remove('hidden');
                    dom.toggleVideoBtn.textContent = '切換英文版';
                } else dom.toggleVideoBtn.classList.add('hidden');
            } else {
                dom.youtubePlayer.src = "";
                dom.videoSection.classList.add('hidden');
                dom.toggleVideoBtn.classList.add('hidden');
            }
            
            let htmlChunks = [];
            if (Object.keys(rcuvIndex).length > 0) {
                const tBookClean = cleanString(data.book);
                let mainV = tBookClean && rcuvIndex[tBookClean] ? rcuvIndex[tBookClean].filter(r => data.parsedChapters.some(tc => tc.ch === r.c && (tc.vStart === null || (r.n >= tc.vStart && r.n <= tc.vEnd)))).map(r => ({...r, b: tBookClean})) : [];
                let psalmV = data.parsedPsalms.length && rcuvIndex['詩篇'] ? rcuvIndex['詩篇'].filter(r => data.parsedPsalms.some(tp => tp.ch === r.c && (tp.vStart === null || (r.n >= tp.vStart && r.n <= tp.vEnd)))).map(r => ({...r, b: '詩篇'})) : [];

                const dayVerses = tBookClean === '詩篇' ? mainV : [...mainV, ...psalmV];

                if (dayVerses.length > 0) {
                    let curBook = '', curChap = '', isFirst = true;
                    dayVerses.forEach(row => {
                        const formattedText = (row.t || "").replace(/\?註：(.*?)\?/g, (m, p1) => {
                            const safeFootnote = p1.replace(/['"&<>]/g, c => ({'\'':'&#39;','"':'&quot;','&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
                            return `<span class="inline-flex items-center justify-center cursor-pointer text-xl ml-1 opacity-80 hover:opacity-100 hover:scale-110 transition-transform" onclick="showFootnoteModal('註：${safeFootnote}')" title="點擊查看註釋">📝</span>`;
                        });
                        if (row.b !== curBook || row.c !== curChap) {
                            htmlChunks.push(`<h5 class="text-2xl font-bold text-stone-800 ${isFirst ? 'mb-4' : 'mt-10 mb-4'} border-b border-stone-200 pb-2">${row.b} 第${row.c}${row.b === '詩篇' ? '篇' : '章'}</h5>`);
                            curBook = row.b; curChap = row.c; isFirst = false;
                        }
                        htmlChunks.push(`<div class="mb-3 flex items-start leading-relaxed"><strong class="text-stone-400 font-bold mr-3 text-base w-6 text-right shrink-0 select-none pt-[2px]">${row.v}</strong><span class="text-stone-800 text-lg">${formattedText}</span></div>`);
                    });
                } else htmlChunks.push('<p class="text-stone-400">找不到符合今日進度的經文。</p>');
            } else htmlChunks.push('<p class="text-red-400">無法載入 rcuv.csv 檔案，請確認檔案存在</p>');
            
            dom.scriptureText.innerHTML = htmlChunks.join('');
            dom.prevDayBtn.disabled = (day === 1);
            dom.nextDayBtn.disabled = (day === 358);
        }

        // --- 智慧分段排隊機制 ---
        function speakTextChunks(text, langMode, onStart, onEnd) {
            if (!text) return;
            const rawChunks = text.match(/[^。！？；.!?;\n]+[。！？；.!?;\n]*/g) || [text];
            const chunks = []; let curr = ""; const MAX = 250;
            rawChunks.forEach(p => {
                let part = p.trim();
                if (!part) return;
                if (curr.length + part.length > MAX) { if (curr) chunks.push(curr); curr = part; }
                else curr += (curr ? " " : "") + part;
            });
            if (curr) chunks.push(curr);
            if (!chunks.length) return;

            let idx = 0, isCanceled = false;
            window._currentSpeechCancel = () => { isCanceled = true; synth.cancel(); };

            function next() {
                if (isCanceled) return;
                if (idx >= chunks.length) { window._currentSpeechCancel = null; if (onEnd) onEnd(); return; }

                const utterance = new SpeechSynthesisUtterance(chunks[idx]);
                if (langMode === 'en') {
                    const allVoices = synth.getVoices();
                    let enV = allVoices.find(v => (v.lang === 'en-US' || v.lang === 'en-GB') && (v.name.includes('Google') || v.name.includes('Online') || v.name.includes('Premium'))) || 
                              allVoices.find(v => v.lang === 'en-US' || v.lang === 'en-GB') || allVoices.find(v => v.lang.startsWith('en'));
                    if (enV) utterance.voice = enV;
                    utterance.lang = 'en-US'; 
                } else {
                    if (dom.voiceSelector.value !== "" && voices[dom.voiceSelector.value]) utterance.voice = voices[dom.voiceSelector.value];
                    utterance.lang = 'zh-TW';
                }
                
                utterance.rate = parseFloat(dom.rateSelector.value);
                utterance.onstart = () => { if (idx === 0 && onStart) onStart(); };
                utterance.onend = () => { if (isCanceled) return; idx++; next(); };
                utterance.onerror = (e) => { 
                    if (isCanceled || e.error === 'canceled' || e.error === 'interrupted') return;
                    console.error("語音播放錯誤:", e); idx++; next(); 
                };
                
                try { synth.speak(utterance); } catch (e) { console.error("TTS 引擎拒絕發聲:", e); idx++; next(); }
            }
            next();
        }

        function handlePlayContent() {
            const isEn = currentViewMode === 'english';
            // 取用抽離反思問題後的純主文
            const txt = isEn ? bibleData[currentDay].contentEn.main : bibleData[currentDay].contentCh.main;
            if (!txt || txt.trim() === "") return;
            if (synth.speaking) synth.cancel();
            speakTextChunks(`${dom.displayTitle.textContent}。 ${isEn ? 'Devotional Content' : '靈修內容'}。\n\n${txt}`, isEn ? 'en' : 'zh',
                () => { 
                    requestWakeLock(); 
                    dom.playBtn.classList.add('hidden'); dom.stopBtn.classList.remove('hidden'); 
                    dom.playScriptureBtn.classList.remove('hidden'); dom.stopScriptureBtn.classList.add('hidden'); 
                    dom.playReflectionBtn.classList.remove('hidden'); dom.stopReflectionBtn.classList.add('hidden');
                },
                handleStop
            );
        }

        function handlePlayScripture() {
            if (!dom.scriptureText.innerText || dom.scriptureText.innerText.includes("載入中") || dom.scriptureText.innerText.includes("找不到")) return;
            let txt = '';
            dom.scriptureText.querySelectorAll('h5, span.text-stone-800').forEach(el => {
                txt += el.tagName === 'H5' ? el.innerText + '。\n' : el.innerText.replace(/📝/g, '') + ' ';
            });
            if (synth.speaking) synth.cancel();
            speakTextChunks(`今日經文。\n\n${txt.trim()}`, 'zh',
                () => { 
                    requestWakeLock(); 
                    dom.playScriptureBtn.classList.add('hidden'); dom.stopScriptureBtn.classList.remove('hidden'); 
                    dom.playBtn.classList.remove('hidden'); dom.stopBtn.classList.add('hidden'); 
                    dom.playReflectionBtn.classList.remove('hidden'); dom.stopReflectionBtn.classList.add('hidden');
                },
                handleStop
            );
        }

        // 🔥 新增：朗讀反思問題邏輯
        function handlePlayReflection() {
            const isEn = currentViewMode === 'english';
            const txt = isEn ? bibleData[currentDay].contentEn.questions : bibleData[currentDay].contentCh.questions;
            if (!txt || txt.trim() === "") return;
            if (synth.speaking) synth.cancel();
            speakTextChunks(`${isEn ? 'Reflection Questions' : '反思問題'}。\n\n${txt}`, isEn ? 'en' : 'zh',
                () => { 
                    requestWakeLock(); 
                    dom.playReflectionBtn.classList.add('hidden'); dom.stopReflectionBtn.classList.remove('hidden'); 
                    dom.playBtn.classList.remove('hidden'); dom.stopBtn.classList.add('hidden');
                    dom.playScriptureBtn.classList.remove('hidden'); dom.stopScriptureBtn.classList.add('hidden');
                },
                handleStop
            );
        }

        function handleStop() {
            releaseWakeLock();
            const cancelFn = window._currentSpeechCancel;
            window._currentSpeechCancel = null; 
            if (cancelFn) cancelFn(); else synth.cancel();
            dom.stopBtn.classList.add('hidden'); dom.playBtn.classList.remove('hidden');
            dom.stopScriptureBtn.classList.add('hidden'); dom.playScriptureBtn.classList.remove('hidden');
            dom.stopReflectionBtn.classList.add('hidden'); dom.playReflectionBtn.classList.remove('hidden');
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
